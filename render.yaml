services:
  - type: web
    name: neighbourgig-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn neighbourgig.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neighbourgig-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: neighbourgig-db
    plan: free
